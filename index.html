<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício boas práticas de CSS - BEM</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="produtos">
        <!-- Produto padrão -->
        <article class="produto">
            <img class="produto__imagem" src="https://via.placeholder.com/100x100" alt="Imagem do produto" loading="lazy">
            <h4 class="produto__nome">Nome do produto</h4>
            <p class="produto__descricao">
                Descrição do produto
            </p>
        </article>
        
        <!-- Produto em destaque (com modificador) -->
        <article class="produto produto--destaque">
            <img class="produto__imagem" src="https://via.placeholder.com/100x100" alt="Imagem do produto em destaque" loading="lazy">
            <h4 class="produto__nome">Nome do produto</h4>
            <p class="produto__descricao">
                Descrição do produto
            </p>
        </article>
        
        <!-- Produto padrão -->
        <article class="produto">
            <img class="produto__imagem" src="https://via.placeholder.com/100x100" alt="Imagem do produto" loading="lazy">
            <h4 class="produto__nome">Nome do produto</h4>
            <p class="produto__descricao">
                Descrição do produto
            </p>
        </article>
    </main>
</body>
</html>
